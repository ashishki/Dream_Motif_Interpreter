# CI — Dream Motif Interpreter
# Runs on every push and pull request.
# All steps are required to pass before a PR may be merged.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Install ──────────────────────────────────────────────────────────────
  # Install all production and dev dependencies from pinned requirement files.
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

  # ── Ruff lint ─────────────────────────────────────────────────────────────
  # Zero violations required. Ruff replaces flake8 + isort + pyupgrade.
  ruff-check:
    name: Ruff lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

      - name: Run ruff check
        run: ruff check app/ tests/

  # ── Ruff format ───────────────────────────────────────────────────────────
  # Format check only — does not auto-format. Developers run `ruff format` locally.
  ruff-format:
    name: Ruff format check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

      - name: Run ruff format check
        run: ruff format --check app/ tests/

  # ── Pytest ────────────────────────────────────────────────────────────────
  # Runs the current unit test suite with placeholder runtime configuration.
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    needs: [ruff-check, ruff-format]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

      # ── Required env vars for tests ──────────────────────────────────────
      # Placeholder values only; CI never injects real credentials.
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://dmi_test:dmi_test@localhost:5432/dmi_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test-anthropic-key
          OPENAI_API_KEY: test-openai-key
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_REFRESH_TOKEN: test-google-refresh-token
          GOOGLE_DOC_ID: test-doc-id
          SECRET_KEY: test-secret-key-32-bytes-minimum-xx
          ENV: test
          EMBEDDING_MODEL: text-embedding-3-small
          RETRIEVAL_THRESHOLD: "0.35"
          MAX_INDEX_AGE_HOURS: "24"
        run: pytest -q --tb=short tests/
